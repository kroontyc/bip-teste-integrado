name: CI

on: [push, pull_request]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & test backend
        run: mvn -B -f backend-module/pom.xml clean verify

  ejb:
    name: EJB Module (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile EJB module
        run: mvn -B -f ejb-module/pom.xml clean package

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build Angular (production)
        run: npm run build --prefix frontend -- --configuration production

      - name: Run Angular unit tests
        run: npm run test --prefix frontend -- --watch=false --browsers=ChromeHeadless
